services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://scouting:scouting@db:5432/scouting
      RIOT_API_KEY: ${RIOT_API_KEY}
      PLATFORM: ${PLATFORM:-euw1}
      REGION: ${REGION:-europe}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-72}
      MIN_GAMES: ${MIN_GAMES:-20}
      MATCH_HISTORY_COUNT: ${MATCH_HISTORY_COUNT:-30}
      CURRENT_PATCH: ${CURRENT_PATCH:-14.9}
      FANDOM_USERNAME: ${FANDOM_USERNAME:-${LP_USERNAME:-}}
      FANDOM_PASSWORD: ${FANDOM_PASSWORD:-${LP_PASSWORD:-}}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scouting
      POSTGRES_PASSWORD: scouting
      POSTGRES_DB: scouting
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scouting"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
