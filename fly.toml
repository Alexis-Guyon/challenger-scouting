# Fly.io deployment config
# Usage:
#   1. fly launch --no-deploy   (creates the app, sets up Postgres if you say yes)
#   2. fly secrets set RIOT_API_KEY=... JWT_SECRET=... LP_USERNAME=... LP_PASSWORD=...
#   3. fly volumes create scouting_data --size 1 --region cdg
#   4. fly deploy

app = "challenger-scouting"
primary_region = "cdg"   # Paris — closest to EUW

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  PLATFORM = "euw1"
  REGION = "europe"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0  # Scale to 0 when idle (cost saver)

[http_service.checks.health]
  grace_period = "30s"
  interval = "30s"
  method = "get"
  path = "/api/health"
  timeout = "5s"

# Persistent volume for SQLite when not using managed Postgres.
# Comment this section out if you use Fly Postgres (DATABASE_URL secret).
[mounts]
  source = "scouting_data"
  destination = "/app/backend/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
