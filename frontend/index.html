<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Challenger Scouting — Pro Edition</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
  // API base URL — set when the frontend is hosted standalone (e.g. Vercel).
  // Empty value = same-origin (when bundled with the FastAPI backend).
  //
  // While the Fly trial is expired, we route Vercel traffic through a
  // Cloudflare quick tunnel that forwards to the local backend.
  // Replace this URL with a real production backend once you have one.
  (function() {
    var h = location.hostname;
    if (h.endsWith(".vercel.app")) {
      window.SCOUTING_API_BASE = "https://jewish-surgeons-motivated-gotta.trycloudflare.com";
    } else {
      window.SCOUTING_API_BASE = window.SCOUTING_API_BASE || "";
    }
  })();
</script>
</head>
<body>

<div id="login-screen" class="login-overlay" style="display:none">
  <form id="login-form" class="login-card">
    <div class="brand" style="margin-bottom:18px;">
      <span class="logo">CS</span>
      <div>
        <h1 style="margin:0;">Challenger Scouting</h1>
        <p class="sub" style="margin:0;">Pro edition — internal use</p>
      </div>
    </div>
    <label>Username
      <input id="lg-user" type="text" autocomplete="username" required/>
    </label>
    <label>Password
      <input id="lg-pass" type="password" autocomplete="current-password" required/>
    </label>
    <div id="login-err" class="login-err"></div>
    <button type="submit">Sign in</button>
  </form>
</div>

<div id="app-shell" style="display:none">
  <header>
    <div class="brand">
      <span class="logo">CS</span>
      <div>
        <h1>Challenger Scouting</h1>
        <p class="sub">SoloQ analytics · EUW</p>
      </div>
    </div>
    <nav>
      <a href="#" data-view="leaderboard" class="active">Ladder</a>
      <a href="#" data-view="watchlist">Watchlist</a>
      <a href="#" data-view="champions">Champions</a>
      <a href="#" data-view="patch">📊 Patch</a>
      <a href="#" data-view="player">Player</a>
      <a href="#" data-view="compare">Compare</a>
      <a href="#" data-view="alerts">Alerts</a>
      <a href="#" data-view="admin">Admin</a>
      <a href="#" data-view="howto">❓ Guide</a>
    </nav>
    <div class="user-menu">
      <span id="user-label" class="muted"></span>
      <button id="glossary-btn" class="secondary" title="Stat definitions">📖 Glossary</button>
      <button id="logout-btn" class="secondary">Logout</button>
    </div>
  </header>
  <main id="app"></main>

  <!-- Champion deep-dive modal -->
  <div id="champ-modal" class="match-modal" aria-hidden="true">
    <div class="match-modal-card">
      <div class="match-modal-head">
        <h3 id="champ-modal-title">Champion</h3>
        <button id="champ-modal-close" class="secondary" style="padding:4px 10px;">✕</button>
      </div>
      <div id="champ-modal-body" class="match-modal-body"></div>
    </div>
  </div>

  <!-- Match deep-dive modal -->
  <div id="match-modal" class="match-modal" aria-hidden="true">
    <div class="match-modal-card">
      <div class="match-modal-head">
        <h3 id="match-modal-title">Match deep-dive</h3>
        <button id="match-modal-close" class="secondary" style="padding:4px 10px;">✕</button>
      </div>
      <div id="match-modal-body" class="match-modal-body"></div>
    </div>
  </div>

  <!-- Glossary panel (slide-in from the right) -->
  <aside id="glossary-panel" class="glossary-panel" aria-hidden="true">
    <div class="glossary-header">
      <h3>Stat glossary</h3>
      <button id="glossary-close" class="secondary" style="padding:4px 10px;">✕</button>
    </div>
    <div class="glossary-body" id="glossary-body"></div>
  </aside>
  <div id="glossary-backdrop" class="glossary-backdrop" aria-hidden="true"></div>
</div>

<template id="tpl-leaderboard">
  <section class="view">
    <div class="filters">
      <label>Role
        <select id="f-role">
          <option value="">All</option>
          <option value="TOP">TOP</option>
          <option value="JGL">JGL</option>
          <option value="MID">MID</option>
          <option value="ADC">ADC</option>
          <option value="SUP">SUP</option>
        </select>
      </label>
      <label>Region
        <select id="f-region">
          <option value="">All</option>
          <option value="euw1" selected>EUW</option>
          <option value="kr">KR</option>
          <option value="na1">NA</option>
          <option value="eun1">EUNE</option>
          <option value="br1">BR</option>
          <option value="jp1">JP</option>
          <option value="oc1">OCE</option>
          <option value="la1">LAN</option>
          <option value="la2">LAS</option>
          <option value="tr1">TR</option>
          <option value="ru">RU</option>
        </select>
      </label>
      <label>Tier
        <select id="f-tier">
          <option value="">All</option>
          <option value="CHALLENGER">Challenger</option>
          <option value="GRANDMASTER">Grandmaster</option>
          <option value="MASTER">Master</option>
        </select>
      </label>
      <label>Patch
        <input id="f-patch" type="text" placeholder="e.g. 16.9"/>
      </label>
      <label>Min games
        <input id="f-min" type="number" value="3" min="1"/>
      </label>
      <label>Sort
        <select id="f-sort">
          <option value="css">CSS Score</option>
          <option value="smurf">🚨 Smurf score</option>
          <option value="lp">LP</option>
          <option value="winrate">Winrate</option>
          <option value="games">Games</option>
          <option value="age">Age (asc)</option>
        </select>
      </label>
      <label>Pro status
        <select id="f-prostatus">
          <option value="">All</option>
          <option value="pro">Pros only</option>
          <option value="fa">Free agents</option>
          <option value="amateur">Amateurs only</option>
        </select>
      </label>
      <label>Smurfs
        <select id="f-smurf">
          <option value="">Show all</option>
          <option value="hide">Hide likely smurfs</option>
          <option value="suspect_only">🚨 Smurfs only</option>
          <option value="clean_only">✅ Clean accounts only</option>
        </select>
      </label>
      <label>Max age
        <input id="f-maxage" type="number" placeholder="e.g. 21" min="14" max="40"/>
      </label>
      <label>Residency
        <select id="f-residency">
          <option value="">Any</option>
          <option value="Europe">Europe</option>
          <option value="Korea">Korea</option>
          <option value="North America">North America</option>
        </select>
      </label>
      <label>Contract ends within
        <select id="f-contract">
          <option value="">—</option>
          <option value="30">30 days</option>
          <option value="90">90 days</option>
          <option value="180">180 days</option>
          <option value="365">1 year</option>
        </select>
      </label>
      <button id="f-apply">Apply</button>
    </div>
    <div class="quick-filters" style="display:flex;gap:6px;margin:0 0 10px;flex-wrap:wrap;align-items:center;">
      <button class="quick-pill" data-quick="fa" title="Show only Free Agents — pros with no current team. One-click recruitment view.">🎯 Free Agents</button>
      <button class="quick-pill" data-quick="rising" title="Show only players flagged as Rising Stars — biggest CSS gain across recent patches.">🌟 Rising Stars</button>
      <button class="quick-pill" data-quick="u21" title="Show only players aged 21 or younger.">👶 U21</button>
      <button class="quick-pill" data-quick="contract90" title="Show pros whose contract ends within 90 days.">⏳ Contract &lt; 90d</button>
      <button class="quick-pill" data-quick="reset" title="Clear all filters">✕ Clear</button>
      <span style="flex:1;"></span>
      <label class="quick-pill" id="lb-group-toggle-wrap" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;" title="Collapse all of a pro's Riot accounts (main + smurfs + alts) into a single line with an '+N accounts' badge.">
        <input type="checkbox" id="lb-group-toggle" style="margin:0;cursor:pointer;"/>
        🧬 Group accounts by pro
      </label>
    </div>
    <div class="table-wrap">
      <table id="lb-table">
        <thead>
          <tr>
            <th title="Rank in current view (offset + position)">#</th>
            <th title="Riot ID — gameName#tagLine">Summoner</th>
            <th title="Account region (platform code)">Reg</th>
            <th title="Pro status from Lolpros: pro / FA / retired / —">Pro</th>
            <th title="Current rostered team (from Lolpros)">Team</th>
            <th title="Age (when birthdate is on Leaguepedia)">Age</th>
            <th title="Riot's official rank tier">Tier</th>
            <th title="League Points — official Riot ranking metric">LP</th>
            <th title="Most-played role on the sample">Role</th>
            <th title="LoL game patch on which this aggregate was computed">Patch</th>
            <th title="Number of SoloQ games we ingested for this player on this patch+role">Games</th>
            <th title="Winrate on the ingested sample">WR</th>
            <th title="Champion pool size — distinct champions with ≥3 games">Pool</th>
            <th title="Challenger Scouting Score 0–100. Z-score vs Challenger pool, weighted by role.">CSS</th>
            <th title="Percentile rank within (patch, role) — P95 = top 5%">%ile</th>
            <th title="Smurf likelihood 0–100. Combines low account-level, hot winrate, mechanical z-score, narrow champion pool.">Smurf</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</template>

<template id="tpl-watchlist">
  <section class="view">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <div>
          <h3 style="margin:0;">Recruitment pipeline</h3>
          <p class="muted" style="margin:2px 0 0;font-size:12px;">Drag players between stages. Each card is a watched prospect — click to open the profile.</p>
        </div>
        <div style="display:flex;gap:6px;">
          <button id="wl-view-kanban" class="quick-pill active" data-mode="kanban">📋 Kanban</button>
          <button id="wl-view-table"  class="quick-pill" data-mode="table">📊 Table</button>
        </div>
      </div>

      <div id="wl-kanban" class="kanban-board" style="margin-top:14px;"></div>

      <div id="wl-table-wrap" class="table-wrap" style="display:none;">
        <table id="wl-table">
          <thead>
            <tr>
              <th>Summoner</th><th>Tier</th><th>LP</th><th>Role</th>
              <th>Games</th><th>CSS</th><th>%ile</th><th>Stage</th><th>Tag</th><th>Added</th><th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </section>
</template>

<template id="tpl-champions">
  <section class="view">
    <div class="filters">
      <label>Role
        <select id="ch-role">
          <option value="">All</option>
          <option value="TOP">TOP</option>
          <option value="JGL">JGL</option>
          <option value="MID">MID</option>
          <option value="ADC">ADC</option>
          <option value="SUP">SUP</option>
        </select>
      </label>
      <label>Sort by
        <select id="ch-sort">
          <option value="games">Total games</option>
          <option value="winrate">Winrate</option>
          <option value="css">Best Champ-CSS</option>
          <option value="mains">Distinct mains</option>
        </select>
      </label>
      <label>Min games
        <input id="ch-min" type="number" value="10" min="1"/>
      </label>
      <label>Search
        <input id="ch-search" type="text" placeholder="Kaisa, Shaco, …"/>
      </label>
    </div>
    <p id="ch-counter" class="muted" style="font-size:12px;margin:0 0 14px;"></p>
    <div id="ch-grid" class="champion-grid"></div>
  </section>
</template>

<template id="tpl-player">
  <section class="view">
    <div class="filters">
      <label>Search summoner (gameName#tag)
        <input id="p-search" type="text" placeholder="name…"/>
      </label>
      <div id="p-suggest" class="suggest"></div>
    </div>
    <div id="p-content"></div>
  </section>
</template>

<template id="tpl-patch">
  <section class="view">
    <div class="card">
      <h3>📊 Patch impact</h3>
      <p class="muted" style="margin-top:0;font-size:12px;">Who profited (or got nerfed) between two patches? CSS delta on the same role across snapshots. Default: latest patch vs the one before.</p>
      <div class="filters" style="margin-top:8px;">
        <label>Patch from
          <select id="pi-from"><option value="">loading…</option></select>
        </label>
        <label>Patch to
          <select id="pi-to"><option value="">loading…</option></select>
        </label>
        <label>Role
          <select id="pi-role">
            <option value="">All</option>
            <option value="TOP">TOP</option>
            <option value="JGL">JGL</option>
            <option value="MID">MID</option>
            <option value="ADC">ADC</option>
            <option value="SUP">SUP</option>
          </select>
        </label>
        <label>Min games per patch
          <input id="pi-min" type="number" value="10" min="1" max="50"/>
        </label>
        <label>Max rows
          <input id="pi-limit" type="number" value="100" min="10" max="500"/>
        </label>
        <button id="pi-apply">Apply</button>
      </div>
      <div id="pi-summary" class="muted" style="font-size:12px;margin-top:8px;"></div>
      <div class="table-wrap" style="margin-top:10px;">
        <table id="pi-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Player</th>
              <th>Reg</th>
              <th>Pro</th>
              <th>Role</th>
              <th>Tier</th>
              <th>CSS (from)</th>
              <th>CSS (to)</th>
              <th title="Δ CSS — green = gained, red = lost">Δ</th>
              <th title="Games on each patch (from / to)">Games</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </section>
</template>

<template id="tpl-team">
  <section class="view">
    <div class="card" id="team-card">
      <p class="muted">Loading team…</p>
    </div>
  </section>
</template>

<template id="tpl-compare">
  <section class="view">
    <div class="card" style="position:relative;">
      <h3>Compare prospects <span class="muted" style="font-size:11px;font-weight:400;">type a name to add up to 5 players</span></h3>
      <div class="row" style="margin-top:6px;align-items:center;gap:10px;">
        <div style="flex:1;position:relative;">
          <input id="cmp-search" type="text" placeholder="Search Riot ID (gameName#tag)…" style="width:100%;"/>
          <div id="cmp-suggest" class="suggest"></div>
        </div>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600;">Role
          <select id="cmp-role">
            <option value="">Any</option>
            <option value="TOP">TOP</option>
            <option value="JGL">JGL</option>
            <option value="MID">MID</option>
            <option value="ADC">ADC</option>
            <option value="SUP">SUP</option>
          </select>
        </label>
      </div>
      <div id="cmp-chips" style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>
    <div id="cmp-result"></div>
  </section>
</template>

<template id="tpl-alerts">
  <section class="view">
    <div class="card">
      <h3>Discord alert rules <span class="muted" style="font-size:11px;font-weight:400;">fired at the end of each pipeline</span></h3>
      <p class="muted" style="font-size:12px;margin-top:0;">Each rule scans the post-ingest DB; matching prospects are pushed to your Discord channel. Conditions are AND'd.</p>
      <div id="al-rules"></div>
      <div style="margin-top:16px;border-top:1px solid var(--line);padding-top:14px;">
        <h4 class="muted-h4">New rule</h4>
        <div class="row">
          <label>Name
            <input id="al-name" type="text" placeholder="U21 elite EU" />
          </label>
          <label>Discord webhook URL
            <input id="al-webhook" type="text" placeholder="https://discord.com/api/webhooks/..." style="min-width:340px;"/>
          </label>
        </div>
        <div class="row" style="margin-top:8px;">
          <label>Min CSS
            <input id="al-min-css" type="number" placeholder="50" />
          </label>
          <label>Min Smurf score
            <input id="al-min-smurf" type="number" placeholder="60" min="0" max="100"/>
          </label>
          <label>Min %ile
            <input id="al-min-pct" type="number" placeholder="90" />
          </label>
          <label>Min games
            <input id="al-min-games" type="number" placeholder="20" />
          </label>
          <label>Max age
            <input id="al-max-age" type="number" placeholder="21" />
          </label>
          <label>Role
            <select id="al-role">
              <option value="">Any</option>
              <option value="TOP">TOP</option>
              <option value="JGL">JGL</option>
              <option value="MID">MID</option>
              <option value="ADC">ADC</option>
              <option value="SUP">SUP</option>
            </select>
          </label>
          <label>Tier
            <select id="al-tier">
              <option value="">Any</option>
              <option value="CHALLENGER">Challenger</option>
              <option value="GRANDMASTER">Grandmaster</option>
              <option value="MASTER">Master</option>
            </select>
          </label>
        </div>
        <div class="row" style="margin-top:8px;align-items:center;gap:14px;">
          <label style="flex-direction:row;align-items:center;gap:6px;font-size:12px;text-transform:none;letter-spacing:0;">
            <input id="al-fa" type="checkbox"/> Free agents only
          </label>
          <label style="flex-direction:row;align-items:center;gap:6px;font-size:12px;text-transform:none;letter-spacing:0;">
            <input id="al-rising" type="checkbox"/> Rising star only
          </label>
          <label style="flex-direction:row;align-items:center;gap:6px;font-size:12px;text-transform:none;letter-spacing:0;">
            <input id="al-pro" type="checkbox"/> Pros only
          </label>
          <button id="al-create">Create rule</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>History <span class="muted" style="font-size:11px;font-weight:400;">last 30 fires across all your rules</span></h3>
      <div id="al-history" class="muted" style="font-size:12px;">Loading…</div>
    </div>
  </section>
</template>

<template id="tpl-howto">
  <section class="view howto-view">
    <div class="howto-hero card">
      <h2 style="margin:0 0 4px;letter-spacing:-0.01em;">📖 Guide d'utilisation</h2>
      <p class="muted" style="margin:0;font-size:13px;">
        Outil de scouting Challenger pour le recrutement pro. Tout ce qui suit
        est en interne uniquement — pas pour partage public.
      </p>
      <div class="howto-toc">
        <a href="#howto-quickstart">⚡ Quick start</a>
        <a href="#howto-ladder">🪜 Ladder</a>
        <a href="#howto-profile">👤 Profil joueur</a>
        <a href="#howto-watchlist">📋 Watchlist + kanban</a>
        <a href="#howto-patch">📊 Patch impact</a>
        <a href="#howto-team">🏟 Team page</a>
        <a href="#howto-compare">🆚 Compare</a>
        <a href="#howto-admin">⚙ Admin</a>
        <a href="#howto-css">🎯 Comprendre le CSS</a>
        <a href="#howto-tips">💡 Astuces</a>
        <a href="#howto-limits">⚠ Limites</a>
      </div>
    </div>

    <div class="card howto-section" id="howto-quickstart">
      <h3>⚡ Quick start — 3 workflows essentiels</h3>

      <div class="howto-flow">
        <div class="howto-flow-step">
          <div class="howto-flow-num">1</div>
          <div>
            <strong>Trouver des prospects</strong>
            <p>Va dans <code>Ladder</code> → coche pill <strong>🎯 Free Agents</strong> ou
            <strong>👶 U21</strong> → trie par CSS desc → tu vois les top candidates
            avec leur tier, age, team actuelle, CSS.</p>
          </div>
        </div>
        <div class="howto-flow-step">
          <div class="howto-flow-num">2</div>
          <div>
            <strong>Évaluer un prospect</strong>
            <p>Click sur sa ligne → profil. 3 onglets : <strong>SoloQ</strong> (radar
            + champion pool + activity heatmap), <strong>Tournament</strong> (stats
            officielles si pro), <strong>vs LEC</strong> (delta vs chaque LEC pro
            au même rôle).</p>
          </div>
        </div>
        <div class="howto-flow-step">
          <div class="howto-flow-num">3</div>
          <div>
            <strong>Track le pipeline recrutement</strong>
            <p>Click ★ sur la ligne ou le profil → ajout watchlist. Va dans
            <code>Watchlist</code> → drag-and-drop le joueur entre les 6 colonnes
            (Watching → Contacted → Trial → Offer → Signed/Pass).</p>
          </div>
        </div>
      </div>
    </div>

    <div class="card howto-section" id="howto-ladder">
      <h3>🪜 Ladder — la vue principale</h3>
      <p>Tous les joueurs Challenger / GM / Master de la DB, triés par CSS.</p>
      <h4>Filtres "lourds" (Apply)</h4>
      <ul>
        <li><strong>Role</strong> · <strong>Region</strong> · <strong>Tier</strong> · <strong>Patch</strong> · <strong>Min games</strong> · <strong>Sort</strong></li>
        <li><strong>Pro status</strong> : Pros / Free Agents / Amateurs uniquement</li>
        <li><strong>Smurfs</strong> : hide / suspect_only / clean_only (basé sur le score smurf 0-100)</li>
        <li><strong>Max age</strong> · <strong>Residency</strong> · <strong>Contract ends within</strong> (30j / 90j / 180j / 1 an)</li>
      </ul>
      <h4>Quick-filter pills (1 click)</h4>
      <ul>
        <li><strong>🎯 Free Agents</strong> — pros sans équipe → recrutement instantané</li>
        <li><strong>🌟 Rising Stars</strong> — gros gain CSS sur les patches récents</li>
        <li><strong>👶 U21</strong> — joueurs ≤ 21 ans</li>
        <li><strong>⏳ Contract &lt; 90d</strong> — pros en fin de contrat (FA imminents)</li>
        <li><strong>🧬 Group accounts by pro</strong> — collapse les smurfs/alts d'un même pro en 1 ligne avec badge "+N accounts" → click sur le badge montre tous ses comptes</li>
      </ul>
      <h4>Sur chaque ligne</h4>
      <ul>
        <li>Click n'importe où → ouvre le profil</li>
        <li>★ = ajouter à ta watchlist (stop click propagation pour pas ouvrir le profil)</li>
        <li>Tag équipe (ex: <code>G2</code>) → ouvre la <a href="#/team/G2">page équipe</a></li>
      </ul>
    </div>

    <div class="card howto-section" id="howto-profile">
      <h3>👤 Profil joueur — où le scouting se fait</h3>

      <h4>Header</h4>
      <ul>

      <h4>📈 Onglet SoloQ</h4>

        <li><strong>2 tableaux</strong> séparés :

            <li>SoloQ stats — prospect vs LEC pros dont le compte Riot est dans la DB</li>
          </ul>
        </li>
        <li>Color-coded : vert si prospect outperforme, rouge si pro outperforme</li>
      </ul>

      <h4>📋 Markdown export</h4>
      <p>Bouton "📋 Markdown" → télécharge un <code>.md</code> propre avec :
      identity + headline CSS + score breakdown + roles &amp; patches + CSS trend + top champions + recent matches + scout notes + smurf signals.
      Paste dans Notion / Discord / Slack pour partager avec le staff non-tech.</p>
    </div>

    <div class="card howto-section" id="howto-watchlist">

        <div>→</div>
        <div class="howto-stage" style="background:linear-gradient(135deg,#f5a524,#f59e0b)">🎯 Trial</div>
        <div>→</div>
        <div class="howto-stage" style="background:linear-gradient(135deg,#22d3a4,#10b981)">📝 Offer</div>
        <div>→</div>
        <div class="howto-stage" style="background:#10b981">✅ Signed</div>
        <div>ou</div>
        <div class="howto-stage" style="background:#7a818f">✖ Pass</div>
      </div>
      <p style="margin-top:14px;">Chaque card affiche : nom · rôle · tier+LP · CSS · tag · "N days in stage". Click sur la card → ouvre le profil.</p>
      <p>Toggle <code>📊 Table</code> pour basculer en vue tableau (plus dense, mêmes infos + colonne Tag éditable inline).</p>

    <div class="card howto-section" id="howto-patch">
      <h3>📊 Patch impact — qui a profité du patch ?</h3>
      <p>Vue dédiée pour le travail de meta. Sélecteurs <strong>Patch from</strong> / <strong>Patch to</strong> auto-init aux 2 plus récents (ordonnés par activité réelle, pas string-sort).</p>
      <ul>
        <li>Tableau trié par <strong>Δ CSS desc</strong> — biggest gainers en haut</li>
        <li>Couleurs : vert ≥ +5 CSS · rouge ≤ −5 CSS</li>
        <li>Filtre par rôle, min-games par patch (default 10)</li>
        <li>Click une ligne → ouvre le profil du joueur (avec son CSS trend en contexte)</li>
      </ul>
      <p class="muted" style="font-size:11px;">Use case typique : nouveau patch sort → tu ouvres cette vue 2 jours plus tard → tu vois quels Challengers ont surfé la nouvelle méta. Si c'est un bot qui jouait Yunara nerf et qui retombe à 35 CSS, peut-être pas ton meilleur prospect.</p>
    </div>

    <div class="card howto-section" id="howto-team">
      <h3>🏟 Team page — scouter une org entière</h3>
      <p>URL directe : <code>/#/team/G2</code> (et n'importe quel team code).</p>
      <ul>
        <li>Logo + nom + league + record sur les 10 derniers matchs</li>
        <li><strong>Active roster</strong> trié par rôle (TOP→JGL→MID→ADC→SUP) — image, country, age, tier+LP, CSS</li>
        <li><strong>Recent matches</strong> — last 10 avec adversaires (logos résolus), patch, side, result. Click → modal match</li>
        <li>Click un joueur de la roster → son profil</li>
      </ul>
      <p>Si l'équipe n'a pas de tournament data dans la DB (ex: Prime League, division 2), fallback synthétique : on construit la team depuis PlayerMeta. Roster fonctionne, recent_matches est vide. Marche pour <code>BIG</code>, <code>KCB</code>, etc.</p>
    </div>

    <div class="card howto-section" id="howto-compare">
      <h3>🆚 Compare — jusqu'à 5 prospects côte-à-côte</h3>
      <ul>
        <li>Tape un nom dans la barre → suggestions live</li>
        <li>Click une suggestion → ajoute en chip</li>
        <li>Max 5 joueurs, click le ✕ d'une chip pour retirer</li>
        <li>Radars superposés + tableau de stats avec deltas color-coded</li>
      </ul>
      <p class="muted" style="font-size:11px;">Use case : tu hésites entre 3 jungles — Compare les met côte-à-côte sur un seul radar pour voir qui a le meilleur tradeoff lane/objectif/vision selon ton style d'équipe.</p>
    </div>

    <div class="card howto-section" id="howto-admin">
      <h3>⚙ Admin — pipelines + scheduler</h3>
      <h4>Vue d'ensemble</h4>
      <ul>
        <li><strong>Hero metrics</strong> — 5 cartes : SoloQ players · Aggregates · Pros matched · Tournament matches · Pro teams</li>
        <li><strong>Daily scheduler</strong> — config (heure, régions, tiers, players, games), rotation tier du jour, ▶ Trigger now</li>
        <li><strong>Recent jobs</strong> — feed live des 10 derniers jobs (auto-refresh 5s) avec status pills</li>
      </ul>
      <h4>➕ Add player by Riot ID</h4>
      <p>Tape un <code>gameName#tagLine</code> + region → ingère ce joueur peu importe son rang. Pipeline : account-v1 → summoner-v4 → ranked entries → match-v5 (last N matches) → CSS. Auto-add to watchlist optionnel.</p>
      <p class="muted" style="font-size:11px;">Use case : tu connais un joueur par nom (ex-pro, ami du staff, amateur LFL) qui n'apparaît pas en Challenger. Add player → 30s plus tard son profil est dispo.</p>
      <h4>🔁 SoloQ ingestion</h4>
      <ul>
        <li>Pills tier/region (multi-select avec gradient quand sélectionné)</li>
        <li>Players per tier × Matches per player</li>
        <li>Auto-route multi-clé si <code>RIOT_API_KEYS</code> défini dans <code>.env</code></li>
        <li>Boutons : ▶ Run ingestion · 🧮 Recompute scores · 🔍 Resolve unknown names</li>
      </ul>
      <h4>🆔 Pro identification + 🏆 Tournament data</h4>
      <ul>
        <li><strong>Lolpros</strong> (preferred) · <strong>Leaguepedia</strong> quick (~75s) · <strong>Leaguepedia FULL</strong> (~6min, weekly)</li>
        <li><strong>Tournament</strong> : ALL · 🇪🇺 EU · 🇰🇷 KR · 🇺🇸 NA · 🏅 Intl</li>
      </ul>
    </div>

    <div class="card howto-section" id="howto-css">
      <h3>🎯 Comprendre le CSS (Challenger Scouting Score)</h3>
      <p>Score 0-100 par <code>(joueur, patch, rôle)</code>. Pipeline :</p>
      <ol>
        <li>Moyenne de chaque métrique (GD@15, KP, dmg share, KDA, vision, etc.)</li>
        <li>Z-score vs la pool Challenger : <code>z = (x − μ_role) / σ_role</code></li>
        <li>Conversion 0-100 : <code>score = clip(50 + 15·z, 0, 100)</code></li>
        <li>Aggrégation en 8 catégories</li>
        <li>Pondération par rôle (SUP→30% vision, ADC→30% damage, etc.)</li>
        <li>Ajustements : <strong>sample factor</strong> (poids ↓ si &lt;50 games), <strong>smurf factor</strong> (×0.7 si level &lt;60), <strong>lobby-LP factor</strong> (×0.90 → ×1.10 selon LP moyen du lobby)</li>
        <li>Percentile rank dans la cohorte (patch, rôle)</li>
      </ol>
      <h4>Labels visuels</h4>
      <ul>
        <li><strong>75+ Elite</strong> — top 5% · <strong>60-75 Strong</strong> — top quartile · <strong>45-60 Average</strong> — médian · <strong>&lt;45 Below avg</strong></li>
      </ul>
      <h4>📈 CSS trend chart</h4>
      <p>Historique des CSS du joueur sur tous les patches (snapshots à chaque ingest). Headline auto si évolution notable. Permet de voir un Rising Star (50→70 en 3 patches) vs un joueur stable.</p>
    </div>

    <div class="card howto-section" id="howto-tips">
      <h3>💡 Astuces qui font gagner du temps</h3>
      <ul>
        <li><strong>Deep links partageables</strong> — <code>#/player/&lt;puuid&gt;</code> · <code>#/team/G2</code> · <code>#/patch</code> · <code>#/leaderboard</code>. Copie l'URL pendant que tu navigues, partage Discord/Slack — le destinataire arrive directement sur la bonne vue.</li>
        <li><strong>Group accounts by pro</strong> sur le ladder — bouton clé quand tu fouilles, sinon tu vois Caps + ses 4 smurfs en doublon.</li>
        <li><strong>Markdown export</strong> du profil — quand tu pitch un prospect au coach. Plus propre qu'un screenshot.</li>
        <li><strong>Patch impact</strong> 2 jours après un nouveau patch — repère les pépites qui ont surfé la nouvelle méta.</li>
        <li><strong>Activity heatmap</strong> pour les transferts inter-régions — tu vois si le joueur KR joue à 4h du mat français → décalage horaire chiant pour un EU bootcamp.</li>
        <li><strong>Click team chip</strong> partout — dans le ladder, dans le profil, dans le Watchlist → tu sautes sur la team page directement.</li>
        <li><strong>Streak badge</strong> sur le profil — un "7W win streak 🔥🔥" est un signal hot, à scout maintenant pas dans 2 semaines.</li>
        <li><strong>Trigger-now scheduler</strong> dans Admin — pour relancer le daily ingest tout de suite sans attendre 4h du matin.</li>
      </ul>
    </div>

    <div class="card howto-section" id="howto-limits">
      <h3>⚠ Limites à connaître</h3>
      <ul>
        <li><strong>Tournament data = unofficial lolesports API</strong> — Riot peut rotate la clé / changer les endpoints sans préavis. Si le sync casse, check <code>services/lolesports_client.py</code>.</li>
        <li><strong>Pas de positions sur les minimaps tournament</strong> — lolesports n'expose pas les coordonnées x/y des kills. Minimap visible uniquement sur les matchs SoloQ (Riot match-v5).</li>
        <li><strong>Personal API Keys expirent toutes les 24h</strong> — si tu vois des erreurs 401 sur les ingest, renouvelle la clé sur developer.riotgames.com.</li>
        <li><strong>SQLite</strong> — confortable jusqu'à ~500MB. Si la DB grossit beaucoup, plan B PostgreSQL est prêt côté code (<code>docker-compose.yml</code>).</li>
        <li><strong>CSS biaisé pour les low-elo</strong> — un Iron II ingéré aura ses stats z-scored vs la pool Challenger → score très bas. Normal, l'outil cible Challenger.</li>
        <li><strong>Cross-region pas comparable</strong> — un 65 CSS KR ≠ 65 CSS EUW (chaque z-score est par région). Future feature : World CSS normalisé.</li>
        <li><strong>Predictive ≠ Descriptive</strong> — CSS dit "qui est statistiquement bon en SoloQ", pas "qui réussira en LEC". Predictive scoring est dans la roadmap.</li>
      </ul>
    </div>

    <div class="card howto-section">
      <p class="muted" style="text-align:center;font-size:11px;margin:0;">
        Outil interne, hébergement privé Cloudflare tunnel + Vercel. Pas de partage public.<br>
        Questions / bugs → <a href="https://github.com/Alexis-Guyon/challenger-scouting/issues" target="_blank">GitHub issues</a>.
      </p>
    </div>
  </section>
