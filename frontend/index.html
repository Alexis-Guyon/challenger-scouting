<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Challenger Scouting — Pro Edition</title>
<link rel="stylesheet" href="style.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
  // API base URL — set when the frontend is hosted standalone (e.g. Vercel).
  // Empty value = same-origin (when bundled with the FastAPI backend).
  //
  // While the Fly trial is expired, we route Vercel traffic through a
  // Cloudflare quick tunnel that forwards to the local backend.
  // Replace this URL with a real production backend once you have one.
  (function() {
    var h = location.hostname;
    if (h.endsWith(".vercel.app")) {
      window.SCOUTING_API_BASE = "https://jewish-surgeons-motivated-gotta.trycloudflare.com";
    } else {
      window.SCOUTING_API_BASE = window.SCOUTING_API_BASE || "";
    }
  })();
</script>
</head>
<body>

<div id="login-screen" class="login-overlay" style="display:none">
  <form id="login-form" class="login-card">
    <div class="brand" style="margin-bottom:18px;">
      <span class="logo">CS</span>
      <div>
        <h1 style="margin:0;">Challenger Scouting</h1>
        <p class="sub" style="margin:0;">Pro edition — internal use</p>
      </div>
    </div>
    <label>Username
      <input id="lg-user" type="text" autocomplete="username" required/>
    </label>
    <label>Password
      <input id="lg-pass" type="password" autocomplete="current-password" required/>
    </label>
    <div id="login-err" class="login-err"></div>
    <button type="submit">Sign in</button>
  </form>
</div>

<div id="app-shell" style="display:none">
  <header>
    <div class="brand">
      <span class="logo">CS</span>
      <div>
        <h1>Challenger Scouting</h1>
        <p class="sub">SoloQ analytics · EUW</p>
      </div>
    </div>
    <nav>
      <a href="#" data-view="leaderboard" class="active">Ladder</a>
      <a href="#" data-view="watchlist">Watchlist</a>
      <a href="#" data-view="champions">Champions</a>
      <a href="#" data-view="patch">📊 Patch</a>
      <a href="#" data-view="player">Player</a>
      <a href="#" data-view="compare">Compare</a>
      <a href="#" data-view="alerts">Alerts</a>
      <a href="#" data-view="admin">Admin</a>
    </nav>
    <div class="user-menu">
      <span id="user-label" class="muted"></span>
      <button id="glossary-btn" class="secondary" title="Stat definitions">📖 Glossary</button>
      <button id="logout-btn" class="secondary">Logout</button>
    </div>
  </header>
  <main id="app"></main>

  <!-- Champion deep-dive modal -->
  <div id="champ-modal" class="match-modal" aria-hidden="true">
    <div class="match-modal-card">
      <div class="match-modal-head">
        <h3 id="champ-modal-title">Champion</h3>
        <button id="champ-modal-close" class="secondary" style="padding:4px 10px;">✕</button>
      </div>
      <div id="champ-modal-body" class="match-modal-body"></div>
    </div>
  </div>

  <!-- Match deep-dive modal -->
  <div id="match-modal" class="match-modal" aria-hidden="true">
    <div class="match-modal-card">
      <div class="match-modal-head">
        <h3 id="match-modal-title">Match deep-dive</h3>
        <button id="match-modal-close" class="secondary" style="padding:4px 10px;">✕</button>
      </div>
      <div id="match-modal-body" class="match-modal-body"></div>
    </div>
  </div>

  <!-- Glossary panel (slide-in from the right) -->
  <aside id="glossary-panel" class="glossary-panel" aria-hidden="true">
    <div class="glossary-header">
      <h3>Stat glossary</h3>
      <button id="glossary-close" class="secondary" style="padding:4px 10px;">✕</button>
    </div>
    <div class="glossary-body" id="glossary-body"></div>
  </aside>
  <div id="glossary-backdrop" class="glossary-backdrop" aria-hidden="true"></div>
</div>

<template id="tpl-leaderboard">
  <section class="view">
    <div class="filters">
      <label>Role
        <select id="f-role">
          <option value="">All</option>
          <option value="TOP">TOP</option>
          <option value="JGL">JGL</option>
          <option value="MID">MID</option>
          <option value="ADC">ADC</option>
          <option value="SUP">SUP</option>
        </select>
      </label>
      <label>Region
        <select id="f-region">
          <option value="">All</option>
          <option value="euw1" selected>EUW</option>
          <option value="kr">KR</option>
          <option value="na1">NA</option>
          <option value="eun1">EUNE</option>
          <option value="br1">BR</option>
          <option value="jp1">JP</option>
          <option value="oc1">OCE</option>
          <option value="la1">LAN</option>
          <option value="la2">LAS</option>
          <option value="tr1">TR</option>
          <option value="ru">RU</option>
        </select>
      </label>
      <label>Tier
        <select id="f-tier">
          <option value="">All</option>
          <option value="CHALLENGER">Challenger</option>
          <option value="GRANDMASTER">Grandmaster</option>
          <option value="MASTER">Master</option>
        </select>
      </label>
      <label>Patch
        <input id="f-patch" type="text" placeholder="e.g. 16.9"/>
      </label>
      <label>Min games
        <input id="f-min" type="number" value="3" min="1"/>
      </label>
      <label>Sort
        <select id="f-sort">
          <option value="css">CSS Score</option>
          <option value="smurf">🚨 Smurf score</option>
          <option value="lp">LP</option>
          <option value="winrate">Winrate</option>
          <option value="games">Games</option>
          <option value="age">Age (asc)</option>
        </select>
      </label>
      <label>Pro status
        <select id="f-prostatus">
          <option value="">All</option>
          <option value="pro">Pros only</option>
          <option value="fa">Free agents</option>
          <option value="amateur">Amateurs only</option>
        </select>
      </label>
      <label>Smurfs
        <select id="f-smurf">
          <option value="">Show all</option>
          <option value="hide">Hide likely smurfs</option>
          <option value="suspect_only">🚨 Smurfs only</option>
          <option value="clean_only">✅ Clean accounts only</option>
        </select>
      </label>
      <label>Max age
        <input id="f-maxage" type="number" placeholder="e.g. 21" min="14" max="40"/>
      </label>
      <label>Residency
        <select id="f-residency">
          <option value="">Any</option>
          <option value="Europe">Europe</option>
          <option value="Korea">Korea</option>
          <option value="North America">North America</option>
        </select>
      </label>
      <label>Contract ends within
        <select id="f-contract">
          <option value="">—</option>
          <option value="30">30 days</option>
          <option value="90">90 days</option>
          <option value="180">180 days</option>
          <option value="365">1 year</option>
        </select>
      </label>
      <button id="f-apply">Apply</button>
    </div>
    <div class="quick-filters" style="display:flex;gap:6px;margin:0 0 10px;flex-wrap:wrap;align-items:center;">
      <button class="quick-pill" data-quick="fa" title="Show only Free Agents — pros with no current team. One-click recruitment view.">🎯 Free Agents</button>
      <button class="quick-pill" data-quick="rising" title="Show only players flagged as Rising Stars — biggest CSS gain across recent patches.">🌟 Rising Stars</button>
      <button class="quick-pill" data-quick="u21" title="Show only players aged 21 or younger.">👶 U21</button>
      <button class="quick-pill" data-quick="contract90" title="Show pros whose contract ends within 90 days.">⏳ Contract &lt; 90d</button>
      <button class="quick-pill" data-quick="reset" title="Clear all filters">✕ Clear</button>
      <span style="flex:1;"></span>
      <label class="quick-pill" id="lb-group-toggle-wrap" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;" title="Collapse all of a pro's Riot accounts (main + smurfs + alts) into a single line with an '+N accounts' badge.">
        <input type="checkbox" id="lb-group-toggle" style="margin:0;cursor:pointer;"/>
        🧬 Group accounts by pro
      </label>
    </div>
    <div class="table-wrap">
      <table id="lb-table">
        <thead>
          <tr>
            <th title="Rank in current view (offset + position)">#</th>
            <th title="Riot ID — gameName#tagLine">Summoner</th>
            <th title="Account region (platform code)">Reg</th>
            <th title="Pro status from Lolpros: pro / FA / retired / —">Pro</th>
            <th title="Current rostered team (from Lolpros)">Team</th>
            <th title="Age (when birthdate is on Leaguepedia)">Age</th>
            <th title="Riot's official rank tier">Tier</th>
            <th title="League Points — official Riot ranking metric">LP</th>
            <th title="Most-played role on the sample">Role</th>
            <th title="LoL game patch on which this aggregate was computed">Patch</th>
            <th title="Number of SoloQ games we ingested for this player on this patch+role">Games</th>
            <th title="Winrate on the ingested sample">WR</th>
            <th title="Champion pool size — distinct champions with ≥3 games">Pool</th>
            <th title="Challenger Scouting Score 0–100. Z-score vs Challenger pool, weighted by role.">CSS</th>
            <th title="Percentile rank within (patch, role) — P95 = top 5%">%ile</th>
            <th title="Smurf likelihood 0–100. Combines low account-level, hot winrate, mechanical z-score, narrow champion pool.">Smurf</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</template>

<template id="tpl-watchlist">
  <section class="view">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <div>
          <h3 style="margin:0;">Recruitment pipeline</h3>
          <p class="muted" style="margin:2px 0 0;font-size:12px;">Drag players between stages. Each card is a watched prospect — click to open the profile.</p>
        </div>
        <div style="display:flex;gap:6px;">
          <button id="wl-view-kanban" class="quick-pill active" data-mode="kanban">📋 Kanban</button>
          <button id="wl-view-table"  class="quick-pill" data-mode="table">📊 Table</button>
        </div>
      </div>

      <div id="wl-kanban" class="kanban-board" style="margin-top:14px;"></div>

      <div id="wl-table-wrap" class="table-wrap" style="display:none;">
        <table id="wl-table">
          <thead>
            <tr>
              <th>Summoner</th><th>Tier</th><th>LP</th><th>Role</th>
              <th>Games</th><th>CSS</th><th>%ile</th><th>Stage</th><th>Tag</th><th>Added</th><th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </section>
</template>

<template id="tpl-champions">
  <section class="view">
    <div class="filters">
      <label>Role
        <select id="ch-role">
          <option value="">All</option>
          <option value="TOP">TOP</option>
          <option value="JGL">JGL</option>
          <option value="MID">MID</option>
          <option value="ADC">ADC</option>
          <option value="SUP">SUP</option>
        </select>
      </label>
      <label>Sort by
        <select id="ch-sort">
          <option value="games">Total games</option>
          <option value="winrate">Winrate</option>
          <option value="css">Best Champ-CSS</option>
          <option value="mains">Distinct mains</option>
        </select>
      </label>
      <label>Min games
        <input id="ch-min" type="number" value="10" min="1"/>
      </label>
      <label>Search
        <input id="ch-search" type="text" placeholder="Kaisa, Shaco, …"/>
      </label>
    </div>
    <p id="ch-counter" class="muted" style="font-size:12px;margin:0 0 14px;"></p>
    <div id="ch-grid" class="champion-grid"></div>
  </section>
</template>

<template id="tpl-player">
  <section class="view">
    <div class="filters">
      <label>Search summoner (gameName#tag)
        <input id="p-search" type="text" placeholder="name…"/>
      </label>
      <div id="p-suggest" class="suggest"></div>
    </div>
    <div id="p-content"></div>
  </section>
</template>

<template id="tpl-patch">
  <section class="view">
    <div class="card">
      <h3>📊 Patch impact</h3>
      <p class="muted" style="margin-top:0;font-size:12px;">Who profited (or got nerfed) between two patches? CSS delta on the same role across snapshots. Default: latest patch vs the one before.</p>
      <div class="filters" style="margin-top:8px;">
        <label>Patch from
          <select id="pi-from"><option value="">loading…</option></select>
        </label>
        <label>Patch to
          <select id="pi-to"><option value="">loading…</option></select>
        </label>
        <label>Role
          <select id="pi-role">
            <option value="">All</option>
            <option value="TOP">TOP</option>
            <option value="JGL">JGL</option>
            <option value="MID">MID</option>
            <option value="ADC">ADC</option>
            <option value="SUP">SUP</option>
          </select>
        </label>
        <label>Min games per patch
          <input id="pi-min" type="number" value="10" min="1" max="50"/>
        </label>
        <label>Max rows
          <input id="pi-limit" type="number" value="100" min="10" max="500"/>
        </label>
        <button id="pi-apply">Apply</button>
      </div>
      <div id="pi-summary" class="muted" style="font-size:12px;margin-top:8px;"></div>
      <div class="table-wrap" style="margin-top:10px;">
        <table id="pi-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Player</th>
              <th>Reg</th>
              <th>Pro</th>
              <th>Role</th>
              <th>Tier</th>
              <th>CSS (from)</th>
              <th>CSS (to)</th>
              <th title="Δ CSS — green = gained, red = lost">Δ</th>
              <th title="Games on each patch (from / to)">Games</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </section>
</template>

<template id="tpl-team">
  <section class="view">
    <div class="card" id="team-card">
      <p class="muted">Loading team…</p>
    </div>
  </section>
</template>

<template id="tpl-compare">
  <section class="view">
    <div class="card" style="position:relative;">
      <h3>Compare prospects <span class="muted" style="font-size:11px;font-weight:400;">type a name to add up to 5 players</span></h3>
      <div class="row" style="margin-top:6px;align-items:center;gap:10px;">
        <div style="flex:1;position:relative;">
          <input id="cmp-search" type="text" placeholder="Search Riot ID (gameName#tag)…" style="width:100%;"/>
          <div id="cmp-suggest" class="suggest"></div>
        </div>
        <label style="display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600;">Role
          <select id="cmp-role">
            <option value="">Any</option>
            <option value="TOP">TOP</option>
            <option value="JGL">JGL</option>
            <option value="MID">MID</option>
            <option value="ADC">ADC</option>
            <option value="SUP">SUP</option>
          </select>
        </label>
      </div>
      <div id="cmp-chips" style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>
    <div id="cmp-result"></div>
  </section>
</template>

<template id="tpl-alerts">
  <section class="view">
    <div class="card">
      <h3>Discord alert rules <span class="muted" style="font-size:11px;font-weight:400;">fired at the end of each pipeline</span></h3>
      <p class="muted" style="font-size:12px;margin-top:0;">Each rule scans the post-ingest DB; matching prospects are pushed to your Discord channel. Conditions are AND'd.</p>
      <div id="al-rules"></div>
      <div style="margin-top:16px;border-top:1px solid var(--line);padding-top:14px;">
        <h4 class="muted-h4">New rule</h4>
        <div class="row">
          <label>Name
            <input id="al-name" type="text" placeholder="U21 elite EU" />
          </label>
          <label>Discord webhook URL
            <input id="al-webhook" type="text" placeholder="https://discord.com/api/webhooks/..." style="min-width:340px;"/>
          </label>
        </div>
        <div class="row" style="margin-top:8px;">
          <label>Min CSS
            <input id="al-min-css" type="number" placeholder="50" />
          </label>
          <label>Min Smurf score
            <input id="al-min-smurf" type="number" placeholder="60" min="0" max="100"/>
          </label>
          <label>Min %ile
            <input id="al-min-pct" type="number" placeholder="90" />
          </label>
          <label>Min games
            <input id="al-min-games" type="number" placeholder="20" />
          </label>
          <label>Max age
            <input id="al-max-age" type="number" placeholder="21" />
          </label>
          <label>Role
            <select id="al-role">
              <option value="">Any</option>
              <option value="TOP">TOP</option>
              <option value="JGL">JGL</option>
              <option value="MID">MID</option>
              <option value="ADC">ADC</option>
              <option value="SUP">SUP</option>
            </select>
          </label>
          <label>Tier
            <select id="al-tier">
              <option value="">Any</option>
              <option value="CHALLENGER">Challenger</option>
              <option value="GRANDMASTER">Grandmaster</option>
              <option value="MASTER">Master</option>
            </select>
          </label>
        </div>
        <div class="row" style="margin-top:8px;align-items:center;gap:14px;">
          <label style="flex-direction:row;align-items:center;gap:6px;font-size:12px;text-transform:none;letter-spacing:0;">
            <input id="al-fa" type="checkbox"/> Free agents only
          </label>
          <label style="flex-direction:row;align-items:center;gap:6px;font-size:12px;text-transform:none;letter-spacing:0;">
            <input id="al-rising" type="checkbox"/> Rising star only
          </label>
          <label style="flex-direction:row;align-items:center;gap:6px;font-size:12px;text-transform:none;letter-spacing:0;">
            <input id="al-pro" type="checkbox"/> Pros only
          </label>
          <button id="al-create">Create rule</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>History <span class="muted" style="font-size:11px;font-weight:400;">last 30 fires across all your rules</span></h3>
      <div id="al-history" class="muted" style="font-size:12px;">Loading…</div>
    </div>
  </section>
</template>

<template id="tpl-admin">
  <section class="view admin-view">

    <!-- ============ HERO STATS ============ -->
    <div class="admin-hero">
      <div class="admin-hero-head">
        <div>
          <h2 style="margin:0;letter-spacing:-0.01em;">⚙ Admin</h2>
          <p class="muted" style="margin:2px 0 0;font-size:12px;">Data pipeline + scheduler control.</p>
        </div>
        <div class="admin-hero-actions">
          <button class="secondary" id="a-refresh" title="Refresh the metrics + jobs panels">↻ Refresh</button>
        </div>
      </div>
      <div id="a-metrics" class="metric-grid"></div>
    </div>

    <!-- ============ SCHEDULER + RECENT JOBS (side-by-side) ============ -->
    <div class="grid-2">
      <div class="card admin-section" id="a-scheduler-card">
        <div class="admin-section-head">
          <h3>⏰ Daily scheduler</h3>
          <span id="a-sched-status-pill" class="status-pill status-idle">—</span>
        </div>
        <div id="a-scheduler-body" class="muted">Loading…</div>
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
          <button id="a-sched-trigger" class="export-btn" title="Run the daily ingest right now (skip waiting for 4am)">▶ Trigger now</button>
        </div>
      </div>

      <div class="card admin-section">
        <div class="admin-section-head">
          <h3>📋 Recent jobs</h3>
          <span class="muted" style="font-size:11px;">last 10</span>
        </div>
        <div id="a-jobs-list" class="job-list"><span class="muted">Loading…</span></div>
      </div>
    </div>

    <!-- ============ ADD PLAYER BY RIOT ID ============ -->
    <div class="card admin-section">
      <div class="admin-section-head">
        <h3>➕ Add player by Riot ID</h3>
        <span class="muted" style="font-size:11px;">any region · any rank</span>
      </div>
      <p class="muted" style="font-size:12px;margin:0 0 12px;">Track any account by Riot ID (former pros, scene amateurs, friends-of-staff). account-v1 → ranked → last N matches → CSS.</p>
      <div class="row" style="align-items:flex-end;gap:10px;">
        <label>Riot ID
          <input id="ap-id" type="text" placeholder="Caps#EUW" style="min-width:220px;"/>
        </label>
        <label>Region
          <select id="ap-region">
            <option value="euw1" selected>EUW</option>
            <option value="kr">KR</option>
            <option value="na1">NA</option>
            <option value="eun1">EUNE</option>
            <option value="br1">BR</option>
            <option value="jp1">JP</option>
            <option value="oc1">OCE</option>
            <option value="la1">LAN</option>
            <option value="la2">LAS</option>
            <option value="tr1">TR</option>
            <option value="ru">RU</option>
          </select>
        </label>
        <label>Match history
          <input id="ap-matches" type="number" value="30" min="1" max="100"/>
        </label>
        <label style="display:inline-flex;align-items:center;gap:6px;font-size:12px;text-transform:none;color:var(--text);">
          <input id="ap-watch" type="checkbox" checked/> Add to watchlist
        </label>
        <button id="ap-submit" class="export-btn">Add &amp; ingest</button>
      </div>
      <div id="ap-result" style="margin-top:10px;"></div>
    </div>

    <!-- ============ MAIN INGEST ============ -->
    <div class="card admin-section">
      <div class="admin-section-head">
        <h3>🔁 Run SoloQ ingestion</h3>
        <span class="muted" style="font-size:11px;">Riot match-v5 → CSS</span>
      </div>
      <p class="muted" style="font-size:12px;margin:0 0 14px;">Pulls Challenger/GM/Master ladders → match history + timelines → aggregates → CSS scores. Auto-routes to multi-key parallel when <code>RIOT_API_KEYS</code> is set.</p>

      <div class="ingest-controls">
        <div class="ingest-numeric">
          <label>Players per tier
            <input id="a-players" type="number" value="50" min="1" max="2000"/>
          </label>
          <label>Matches per player
            <input id="a-matches" type="number" value="30" min="1" max="100"/>
          </label>
        </div>

        <div class="ingest-pills">
          <span class="ingest-pill-label">Tiers</span>
          <label class="check-pill"><input id="a-tier-challenger" type="checkbox" checked/><span>Challenger</span></label>
          <label class="check-pill"><input id="a-tier-grandmaster" type="checkbox"/><span>GM</span></label>
          <label class="check-pill"><input id="a-tier-master" type="checkbox"/><span>Master</span></label>
